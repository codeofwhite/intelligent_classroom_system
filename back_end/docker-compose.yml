version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: minio_server
    ports:
      - "9000:9000"    # API 端口
      - "9001:9001"    # 控制台端口 (Web 管理界面)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123  # 建议修改
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # 数据库服务
  user-db:
    image: mysql:8.0
    container_name: user-mysql
    environment:
      MYSQL_DATABASE: user_center_db
      MYSQL_ROOT_PASSWORD: password123
    ports:
      - "3306:3306"

  # 用户中心服务
  user-center-service:
    build: ./user-center-service
    container_name: user-center-app
    ports:
      - "5001:5001" # 建议把不同服务的对外端口错开，比如 5001
    depends_on:
      - user-db
    environment:
      DB_HOST: user-db
      DB_USER: root
      DB_PASSWORD: password123
      DB_NAME: user_center_db

  model-inference-service:
    build: ./model-inference-service
    container_name: model-inference-app
    ports:
      - "5002:5002" # 之前是 5000，改为 5002 避免冲突
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET_NAME: video-bucket

  face-recognition-service:
    build: ./face-recognition-service
    container_name: face-recognition-app
    ports:
      - "5003:5003" # 之前是 5000，改为 5003 避免冲突

volumes:
  minio_data: